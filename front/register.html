<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="api-base" content="">
  <title>Cadastro - StudyFlow</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/env.js"></script>
  <script src="js/config.js"></script>
</head>
<body>

<div class="auth-page">
  <div class="auth-left">
    <div class="auth-brand">
      <div class="auth-brand-logo">📚</div>
      <h1>StudyFlow</h1>
      <p>Organize seus estudos, acompanhe seu progresso e alcance seus objetivos.</p>
    </div>
    <div class="auth-features">
      <div class="auth-feature">
        <div class="auth-feature-icon">📊</div>
        <span>Estatísticas detalhadas</span>
      </div>
      <div class="auth-feature">
        <div class="auth-feature-icon">🎯</div>
        <span>Metas personalizadas</span>
      </div>
      <div class="auth-feature">
        <div class="auth-feature-icon">⚡</div>
        <span>Flashcards inteligentes</span>
      </div>
    </div>
  </div>
  <div class="auth-right">
    <form class="auth-form" onsubmit="return false;">
      <h2 class="auth-title">Criar sua conta</h2>
      <p class="auth-subtitle">Comece a organizar seus estudos hoje</p>
      
      <div class="input-group">
        <label class="input-label">Nome</label>
        <input type="text" id="nome" class="input" placeholder="Seu nome">
      </div>
      
      <div class="input-group">
        <label class="input-label">Email</label>
        <input type="email" id="email" class="input" placeholder="seu@email.com">
      </div>
      
      <div class="input-group">
        <label class="input-label">Senha</label>
        <input type="password" id="senha" class="input" placeholder="Mínimo 6 caracteres">
      </div>
      
      <button class="btn btn-primary btn-lg w-full" onclick="register()">
        Criar conta
      </button>
      
      <div class="auth-footer">
        Já tem conta? <a href="login.html">Entrar</a>
      </div>
    </form>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
