<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="api-base" content="">
<title>StudyFlow - Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/env.js"></script>
<script src="js/config.js"></script>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" aria-label="Alternar tema">🌙</button>

<div class="container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">📚</div>
        <h1>StudyFlow</h1>
      </div>
    </div>
    
    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Menu</div>
        <a class="sidebar-link active" href="dashboard.html">
          <span class="sidebar-link-icon">🏠</span>
          Dashboard
        </a>
      </div>
      
      <div class="sidebar-section">
        <div class="sidebar-section-title">Matérias</div>
        <div id="sidebar-subjects"></div>
        <a class="sidebar-link" onclick="showCreateSubjectModal()" style="color: var(--accent-primary);">
          <span class="sidebar-link-icon">+</span>
          Nova Matéria
        </a>
      </div>
    </nav>
    
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="user-avatar">U</div>
        <div class="user-info">
          <div class="user-name" id="user-name">Usuário</div>
          <div class="user-role">Estudante</div>
        </div>
      </div>
    </div>
  </aside>
  
  <main class="main-content">
    <header class="content-header">
      <h1 class="page-title">Dashboard</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="showCreateSubjectModal()">
          + Nova Matéria
        </button>
      </div>
    </header>
    
    <div class="content-body">
      <div class="stats-grid stagger" id="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Matérias</div>
          <div class="stat-value" id="stat-subjects">0</div>
        </div>
        <div class="stat-card success">
          <div class="stat-label">Flashcards</div>
          <div class="stat-value" id="stat-flashcards">0</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-label">Horas Estudadas</div>
          <div class="stat-value" id="stat-hours">0</div>
        </div>
        <div class="stat-card info">
          <div class="stat-label">Sequência</div>
          <div class="stat-value" id="stat-streak">0</div>
        </div>
      </div>
      
      <div class="tabs">
        <button class="tab active" data-tab="all" onclick="dashboardSwitchTab('all')">Todas</button>
        <button class="tab" data-tab="recent" onclick="dashboardSwitchTab('recent')">Recentes</button>
        <button class="tab" data-tab="favorites" onclick="dashboardSwitchTab('favorites')">Favoritas</button>
      </div>
      
      <div id="tab-all" class="tab-content active">
        <div class="grid-3 stagger" id="subjects-grid"></div>
      </div>
      
      <div id="tab-recent" class="tab-content">
        <div class="grid-3 stagger" id="recent-subjects"></div>
      </div>
      
      <div id="tab-favorites" class="tab-content">
        <div class="empty-state">
          <div class="empty-state-icon">⭐</div>
          <div class="empty-state-title">Nenhuma favorita</div>
          <div class="empty-state-desc">Marque matérias como favorita para vê-las aqui</div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="create-subject-modal" class="modal-backdrop" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Nova Matéria</h3>
      <button class="modal-close" onclick="closeCreateSubjectModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="input-group">
        <label class="input-label">Nome da Matéria</label>
        <input type="text" id="subject-name" class="input" placeholder="Ex: Matemática">
      </div>
      <div class="input-group">
        <label class="input-label">Descrição (opcional)</label>
        <textarea id="subject-desc" class="input" placeholder="Breve descrição da matéria..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeCreateSubjectModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="createSubject()">Criar Matéria</button>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
