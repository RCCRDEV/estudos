<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>StudyFlow</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<button class="theme-toggle" onclick="toggleTheme()" aria-label="Alternar tema">🌗</button>
<div class="container">

<!-- Sidebar -->
<div class="sidebar">
<h2>StudyFlow</h2>

<ul>
<li>Dashboard</li>
<li>Matérias</li>
<li>Tarefas</li>
<li>Progresso</li>
</ul>

</div>

<!-- Conteúdo -->
<div class="content">

<h1>Minhas Matérias</h1>

<div class="login-box" style="max-width:520px;margin:20px 0;">
  <h2 style="margin:0 0 12px 0;">Criar nova matéria</h2>
  <input id="subject-name" placeholder="Nome da matéria">
  <input id="subject-desc" placeholder="Descrição (opcional)">
  <button onclick="createSubject()">Criar</button>
</div>

<div id="subjects" class="subjects">

<!-- Lista gerada via JS -->

</div>

</div>

</div>

<script src="js/script.js"></script>
</body>
</html>
