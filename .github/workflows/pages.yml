name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gerar js/env.js com URL da API
        working-directory: front
        env:
          V: ${{ vars.PUBLIC_API_URL }}
          S: ${{ secrets.PUBLIC_API_URL }}
        run: |
          node -e "const fs=require('fs'); const u=(process.env.V||process.env.S||'').trim(); fs.writeFileSync('js/env.js','window.API_BASE='+JSON.stringify(u)+';');"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: front
      - id: deployment
        uses: actions/deploy-pages@v4
